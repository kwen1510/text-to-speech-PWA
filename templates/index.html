<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111827">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Kitten TTS">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Kitten TTS</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <link rel="icon" href="{{ url_for('static', filename='icons/icon.svg') }}" type="image/svg+xml">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="app-shell">
      <section class="panel">
        <header class="header">
          <div>
            <p class="eyebrow">Render-hosted KittenTTS</p>
            <h1>Kitten TTS</h1>
          </div>
          <span id="serviceStatus" class="status-pill">Checking</span>
        </header>

        <form id="ttsForm">
          <label class="field">
            <span>Text</span>
            <textarea
              id="textInput"
              maxlength="{{ max_text_length }}"
              rows="8"
              spellcheck="true"
            >This is real KittenTTS running from a Flask app on Render.</textarea>
          </label>

          <div class="controls-grid">
            <label class="field">
              <span>Kitten voice</span>
              <select id="voiceSelect">
                {% for voice in voices %}
                  <option value="{{ voice }}" {% if voice == "Bella" %}selected{% endif %}>{{ voice }}</option>
                {% endfor %}
              </select>
            </label>

            <label class="field">
              <span>Speed <output id="speedValue">1.00</output></span>
              <input id="speedInput" type="range" min="0.7" max="1.4" step="0.05" value="1">
            </label>
          </div>

          <div class="actions">
            <button id="generateButton" type="submit">Generate speech</button>
            <a id="downloadLink" class="secondary button-link disabled" aria-disabled="true">Download WAV</a>
          </div>
        </form>

        <div class="player-wrap">
          <audio id="audioPlayer" controls></audio>
          <p id="statusText" aria-live="polite">Ready.</p>
        </div>
      </section>
    </main>

    <script>
      window.KITTEN_TTS_CONFIG = {
        maxTextLength: {{ max_text_length }},
        voices: {{ voices | list | tojson }}
      };
    </script>
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  </body>
</html>
