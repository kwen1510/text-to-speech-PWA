services:
  - type: web
    name: kitten-tts-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/preload_model.py
    startCommand: gunicorn app:app --workers 1 --threads 2 --timeout 180
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: MAX_TEXT_LENGTH
        value: "1000"
      - key: KITTEN_MODEL_NAME
        value: KittenML/kitten-tts-nano-0.8
      - key: KITTEN_FALLBACK_MODEL_NAME
        value: KittenML/kitten-tts-mini-0.8
      - key: KITTEN_CACHE_DIR
        value: .cache/huggingface
