<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111827">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Pocket TTS">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pocket TTS</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <link rel="icon" href="{{ url_for('static', filename='icons/icon.svg') }}" type="image/svg+xml">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="app-shell">
      <section class="panel">
        <header class="header">
          <div>
            <p class="eyebrow">Render-hosted Pocket-TTS</p>
            <h1>Pocket TTS</h1>
          </div>
          <span id="serviceStatus" class="status-pill">Checking</span>
        </header>

        <form id="ttsForm">
          <label class="field">
            <span>Text</span>
            <textarea
              id="textInput"
              maxlength="{{ max_text_length }}"
              rows="8"
              spellcheck="true"
            >This is Pocket TTS running from a Flask app. It keeps the model in memory between requests.</textarea>
          </label>

          <div class="controls-grid">
            <label class="field">
              <span>Pocket voice</span>
              <select id="voiceSelect">
                {% for voice in voices %}
                  <option value="{{ voice }}" {% if voice == default_voice %}selected{% endif %}>{{ voice | title }}</option>
                {% endfor %}
              </select>
            </label>
          </div>

          <div class="actions">
            <button id="generateButton" type="submit">Generate speech</button>
            <a id="downloadLink" class="secondary button-link disabled" aria-disabled="true">Download WAV</a>
          </div>
        </form>

        <div class="player-wrap">
          <audio id="audioPlayer" controls></audio>
          <p id="statusText" aria-live="polite">Ready.</p>
        </div>
      </section>
    </main>

    <script>
      window.POCKET_TTS_CONFIG = {
        maxTextLength: {{ max_text_length }},
        voices: {{ voices | list | tojson }}
      };
    </script>
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  </body>
</html>
