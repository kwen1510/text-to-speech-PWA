services:
  - type: web
    name: pocket-tts-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/preload_model.py
    startCommand: gunicorn app:app
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: MAX_TEXT_LENGTH
        value: "300"
      - key: POCKET_TTS_LANGUAGE
        value: english
      - key: POCKET_TTS_DEFAULT_VOICE
        value: alba
      - key: POCKET_TTS_QUANTIZE
        value: "1"
      - key: HF_HOME
        value: .cache/huggingface
      - key: XDG_CACHE_HOME
        value: .cache
      - key: WEB_CONCURRENCY
        value: "1"
      - key: GUNICORN_THREADS
        value: "1"
      - key: GUNICORN_TIMEOUT
        value: "180"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: MALLOC_ARENA_MAX
        value: "2"
